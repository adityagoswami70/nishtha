<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Your Surprise</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:Georgia, "Times New Roman", serif;
    color:#fff;
    background:
        linear-gradient(rgba(38,18,39,.25), rgba(38,18,39,.58)),
        url("f2.jpeg") center/cover no-repeat;
}

.glow{
    position:absolute;
    width:360px;
    height:360px;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    filter:blur(50px);
    animation:drift 8s ease-in-out infinite alternate;
}

.glow.one{
    top:8%;
    left:8%;
}

.glow.two{
    right:4%;
    bottom:8%;
    animation-delay:1.6s;
}

@keyframes drift{
    from{ transform:translate3d(0,0,0) scale(1); }
    to{ transform:translate3d(35px,-24px,0) scale(1.12); }
}

.card{
    width:min(92vw,620px);
    padding:42px 32px;
    text-align:center;
    border:1px solid rgba(255,255,255,.42);
    background:rgba(255,255,255,.17);
    backdrop-filter:blur(16px);
    box-shadow:0 28px 70px rgba(35,14,34,.32);
    position:relative;
}

.eyebrow{
    font-size:.86rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:14px;
    opacity:.88;
}

h1{
    font-size:clamp(2.4rem, 8vw, 5rem);
    line-height:.98;
    font-weight:700;
    margin-bottom:18px;
    text-shadow:0 12px 35px rgba(0,0,0,.28);
}

p{
    max-width:470px;
    margin:0 auto 28px;
    font-size:clamp(1rem, 3vw, 1.18rem);
    line-height:1.7;
}

.button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:54px;
    padding:0 30px;
    border-radius:999px;
    color:#9d174d;
    background:#fff;
    font-weight:700;
    text-decoration:none;
    box-shadow:0 18px 35px rgba(80,18,52,.28);
    transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
}

.button:hover{
    transform:translateY(-4px) scale(1.03);
    background:#ffe4ef;
    box-shadow:0 24px 46px rgba(80,18,52,.36);
}

.heart{
    position:absolute;
    bottom:-40px;
    color:rgba(255,255,255,.82);
    animation:floatUp linear infinite;
    pointer-events:none;
}

@keyframes floatUp{
    from{ transform:translateY(0) rotate(0deg); opacity:0; }
    18%{ opacity:1; }
    to{ transform:translateY(-115vh) rotate(220deg); opacity:0; }
}
</style>
</head>
<body>
<div class="glow one"></div>
<div class="glow two"></div>

<main class="card">
    <div class="eyebrow">Made only for you</div>
    <h1>Open Your Surprise</h1>
    <p>A little page full of memories, sorry, love, and everything I wanted to say from my heart.</p>
    <a class="button" href="try.html">Start the Surprise</a>
</main>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="&#10084;";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*18+14)+"px";
    heart.style.animationDuration=(Math.random()*4+5)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),9000);
}

setInterval(createHeart,320);
</script>
</body>
</html>
